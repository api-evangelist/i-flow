name: I Flow
description: >-
  iFlow Inc. is an energy and water solutions provider headquartered in
  Santa Ana, California, offering products and services for the sustainable
  use of vital resources including water metering and leak detection,
  wastewater management, gas measurement and control, thermal energy/BTU
  metering, and data connectivity solutions. No public developer APIs are
  documented at this time.
